server {
  listen __BKCI_CMDB_DEVNET_HTTP_PORT__;
  server_name "__BKCI_CMDB_DEVNET_FQDN__";

#  ### ssl config begin ###
#  listen __BKCI_DEVNET_HTTPS_PORT__ ssl;
#  include devops.ssl;
#  # force https-redirects
#  # if ($scheme = http) {
#  #   return 301 https://$server_name$request_uri;
#  # }
#  ### ssl config end ###

  access_log __INSTALL_PATH__/logs/ci/nginx/cmdb.devnet.proxy.access.$log_date.log devops_format;
  error_log __INSTALL_PATH__/logs/ci/nginx/cmdb.devnet.proxy.error.log;

  # server的通用配置
  include server.common.conf;

  #DEVNET代理的网关路径
  include vhosts/cmdb.devnet.proxy.conf;
}

